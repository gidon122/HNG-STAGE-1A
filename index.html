<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card — Stage 1A</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <article data-testid="test-todo-card" class="card">
    <h2 data-testid="test-todo-title" id="title">Complete HNG Stage 0 Task</h2>
    <p data-testid="test-todo-description">Build a testable todo card using HTML, CSS, and JavaScript.</p>

    <span data-testid="test-todo-priority" class="priority high">High</span>
    <span data-testid="test-todo-priority-indicator" class="priority-indicator high"></span>

    <time data-testid="test-todo-due-date" id="dueDate" datetime="2026-04-16T18:00:00">Due Apr 16, 2026</time>
    <span data-testid="test-todo-time-remaining" id="timeRemaining" aria-live="polite">Calculating...</span>
    <span data-testid="test-todo-overdue-indicator" id="overdueIndicator"></span>
    <span data-testid="test-todo-status" id="status">Pending</span>

    <label for="checkbox" class="toggle-row">
      <input type="checkbox" id="checkbox" data-testid="test-todo-complete-toggle" />
      Mark as complete
    </label>

    <label for="statusControl">Status:</label>
    <select id="statusControl" data-testid="test-todo-status-control">
      <option value="Pending">Pending</option>
      <option value="In Progress">In Progress</option>
      <option value="Done">Done</option>
    </select>

    <div data-testid="test-todo-collapsible-section" id="collapsibleSection" class="collapsible">
      <p>Additional details: This is an extended description that can be long and needs to be collapsible for better UI.</p>
    </div>
    <button data-testid="test-todo-expand-toggle" id="expandToggle" aria-expanded="false" aria-controls="collapsibleSection">Expand</button>

    <ul data-testid="test-todo-tags" class="tags" role="list">
      <li data-testid="test-todo-tag-work" role="listitem">Work</li>
      <li data-testid="test-todo-tag-urgent" role="listitem">Urgent</li>
    </ul>

    <div class="actions">
      <button data-testid="test-todo-edit-button" class="edit">Edit</button>
      <button data-testid="test-todo-delete-button" class="delete">Delete</button>
    </div>
  </article>

  <form data-testid="test-todo-edit-form" id="editForm" class="edit-form" style="display: none;">
    <label for="editTitle">Title:</label>
    <input type="text" id="editTitle" data-testid="test-todo-edit-title-input" />

    <label for="editDescription">Description:</label>
    <textarea id="editDescription" data-testid="test-todo-edit-description-input"></textarea>

    <label for="editPriority">Priority:</label>
    <select id="editPriority" data-testid="test-todo-edit-priority-select">
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>

    <label for="editDueDate">Due Date:</label>
    <input type="datetime-local" id="editDueDate" data-testid="test-todo-edit-due-date-input" />

    <div class="edit-actions">
      <button type="button" data-testid="test-todo-save-button" id="saveButton">Save</button>
      <button type="button" data-testid="test-todo-cancel-button" id="cancelButton">Cancel</button>
    </div>
  </form>

  <script src="script.js"></script>
</body>
</html>
